name: Process data and deploy

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout surfclim
        uses: actions/checkout@v4

      - name: Clone pom-cost raw data
        run: |
          git clone --depth=1 \
            --branch main \
            https://github.com/pom-cost/pom-cost.github.io.git \
            /tmp/pom-cost

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scipy plotly openpyxl

      - name: Process raw files and regenerate plots
        run: python src/process_all.py --raw-dir /tmp/pom-cost/data/raw

      - name: Commit updated data and plots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/individual_data.csv data/mhw_status.json data/cmems_climatology.json plots/
          git diff --cached --quiet || git commit -m "data: regenerate individual_data.csv and plots [skip ci]"
          git push origin HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
