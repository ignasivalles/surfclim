<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — surfclim</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app">

    <!-- ══ TOP BAR ══ -->
    <header class="top-bar">
        <div class="top-bar-inner">
            <a class="brand" href="index.html" style="text-decoration:none;color:inherit">surfclim</a>
            <nav class="pill-nav" role="navigation" aria-label="Sections">
                <a class="nav-pill" href="stories.html">Stories</a>
                <a class="nav-pill active" href="about.html">About</a>
            </nav>
        </div>
    </header>

    <!-- ══ CONTENT ══ -->
    <main class="prose-section">
        <div class="prose-body" id="md-content">Loading…</div>
    </main>

    <!-- ══ FOOTER ══ -->
    <footer class="site-footer">
        <p class="footer-copy">
            &copy; 2025 surfclim &middot;
            powered by <a href="https://github.com/ignasivalles" target="_blank" rel="noopener">@ignasivalles</a>
        </p>
    </footer>

</div>

<script>
    fetch('about.md')
        .then(r => r.text())
        .then(md => {
            document.getElementById('md-content').innerHTML = marked.parse(md);
        })
        .catch(() => {
            document.getElementById('md-content').textContent = 'Could not load about.md';
        });
</script>
</body>
</html>
